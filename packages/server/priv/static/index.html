<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>boba-raider-8</title>
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>Todo App</h1>
    </header>

    <section id="todo-form-section">
      <form id="todo-form">
        <input type="text" id="title" name="title" placeholder="Todo title" required>
        <textarea id="description" name="description" placeholder="Description (optional)"></textarea>
        <select id="priority" name="priority">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>
        <button type="submit">Add Todo</button>
      </form>
    </section>

    <section id="filter-section">
      <div id="filter-tabs">
        <button type="button" data-filter="all">All</button>
        <button type="button" data-filter="active">Active</button>
        <button type="button" data-filter="completed">Completed</button>
      </div>
    </section>

    <section id="todo-list-section">
      <ul id="todo-list"></ul>
    </section>

    <div id="error-display"></div>
  </div>

  <script type="module" src="/static/js/app.js"></script>
</body>
</html>
